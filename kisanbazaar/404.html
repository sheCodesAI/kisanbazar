<!DOCTYPE html>
<html lang="en">

<head>

<body style="min-height:100vh; display:flex; flex-direction:column;">

    <nav class="navbar">

        <ul class="navbar-nav">
            <li><a href="/index.html">Home</a></li>
            <li><a href="/products.html">Products</a></li>
        </ul>
        <div class="navbar-actions">

        </div>
    </nav>

    <div style="flex:1; display:flex; align-items:center; justify-content:center; text-align:center; padding:40px;">
        <div>

            <div style="display:flex; gap:16px; justify-content:center; flex-wrap:wrap;">

            </div>

    <footer
        style="background:var(--text); color:rgba(255,255,255,0.6); text-align:center; padding:20px; font-size:13px;">
        © 2025 KisanBazaar — Made with 💚 for Indian Farmers
    </footer>

    <style>
        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-16px);
            }
        }
    </style>
<script src="js/app.js"></script>
